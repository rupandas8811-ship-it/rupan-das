<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSK PEOPLE - REGISTRY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Jost:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/index.css">
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        font-family: 'Jost', sans-serif;
        background-color: #000000;
        color: #ffffff;
        margin: 0;
      }
      h1, h2, h3, h4, .font-cinzel {
        font-family: 'Cinzel', serif;
      }
      #root {
        min-height: 100vh;
      }
      
      /* Marquee Animations - Fixed for Production */
      @keyframes marquee {
        0% { transform: translate3d(0, 0, 0); }
        100% { transform: translate3d(-50%, 0, 0); }
      }

      @keyframes marquee-slow {
        0% { transform: translate3d(0, 0, 0); }
        100% { transform: translate3d(-50%, 0, 0); }
      }

      .animate-marquee {
        display: flex !important;
        width: max-content !important;
        animation: marquee 30s linear infinite !important;
        will-change: transform;
      }

      .animate-marquee-slow {
        display: flex !important;
        width: max-content !important;
        animation: marquee-slow 60s linear infinite !important;
        will-change: transform;
      }

      /* Custom scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 10px;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 100, 0, 0.2);
        border-radius: 10px;
      }

      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 100, 0, 0.4);
      }
    </style>
  </head>
  <body class="bg-black text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
